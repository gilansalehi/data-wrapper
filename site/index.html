<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data-wrapper — HTML-first reactivity</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="canonical" href="https://data-wrapper.org/">
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="Zero-dependency, HTML-first reactivity — one custom element, three wiring tokens, no build step. JavaScript you already know, no magic.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="data-wrapper">
    <meta property="og:title" content="data-wrapper — HTML-first reactivity">
    <meta property="og:description" content="Zero-dependency, HTML-first reactivity — one custom element, three wiring tokens, no build step.">
    <meta property="og:url" content="https://data-wrapper.org/">
    <meta property="og:image" content="https://data-wrapper.org/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="data-wrapper — HTML-first reactivity">
    <meta name="twitter:description" content="Zero-dependency, HTML-first reactivity — one custom element, three wiring tokens, no build step.">
    <meta name="twitter:image" content="https://data-wrapper.org/icon-512.png">
    <script type="importmap">{"imports":{"data-wrapper":"/dist/data-wrapper.js","state/":"/state/"}}</script>
    <script>
        // Apply saved theme synchronously to avoid flash. The /state/theme.js
        // module reads this attribute when first imported by any component.
        (() => {
            try {
                const v = localStorage.getItem('data-wrapper:theme');
                if (v === 'light' || v === 'dark') document.documentElement.dataset.theme = v;
            } catch {}
        })();
    </script>
    <link rel="stylesheet" href="/assets/css/index.css">
    <script src="/dist/data-wrapper.js" type="module" data-shim-src="https://ga.jspm.io/npm:es-module-shims@2.8.1/dist/es-module-shims.js"></script>
</head>
<body>

<data-wrapper id="nav" src="/views/nav.html" $data-nav-open="open"></data-wrapper>

<header>
    <!-- Swap back to /views/framework/hero.html to restore the "NO" hero. -->
    <data-wrapper src="/views/framework/hero-tag.html"></data-wrapper>
</header>

<main>
    <!-- Hidden page TOC: the source the hamburger nav mirrors into "On this page".
         Keeps the marketing layout full-bleed; this only feeds the nav. Labels and
         order track the section wrappers below. -->
    <aside class="docs-toc" hidden>
        <nav aria-label="Page sections">
            <ol>
                <li><a href="#nobuild">No build step</a></li>
                <li><a href="#views">Load HTML views</a></li>
                <li><a href="#tokens">Three tokens</a></li>
                <li><a href="#token-examples">Token deep dive</a></li>
                <li><a href="#todos">Todo app</a></li>
                <li><a href="#next">Keep going</a></li>
                <li><a href="#fit">Who it's for</a></li>
            </ol>
        </nav>
    </aside>

    <data-wrapper id="nobuild" src="/views/framework/nobuild.html"></data-wrapper>
    <data-wrapper id="views"   src="/views/framework/know.html"></data-wrapper>
    <data-wrapper id="tokens"  src="/views/framework/tokens.html"></data-wrapper>
    <data-wrapper id="token-examples" src="/views/framework/token-examples.html"></data-wrapper>
    <data-wrapper id="todos" src="/views/framework/playground.html"></data-wrapper>
    <data-wrapper id="next" src="/views/framework/next.html"></data-wrapper>
    <data-wrapper id="fit" src="/views/framework/fit.html"></data-wrapper>
</main>

<data-wrapper src="/views/footer.html"></data-wrapper>
</body>
</html>
