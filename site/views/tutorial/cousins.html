<script type="module" data-module="@tutorial/cousins">
    // One view, many instances: the host page mounts this after each tutorial
    // section with ?section=<key>, and the factory returns that section's
    // field notes as instance scope. Unknown keys throw loudly.
    //
    // Every entry carries a `code` key (empty string when no snippet earns
    // its place) so `*if="./code"` resolves in row scope instead of falling
    // through to the static-literal fallback.
    const SECTIONS = {
        nobuild: {
            hook: 'No build!',
            tagline: 'A script tag is the whole install. The nearest neighbors make the same promise; the majors ask for a toolchain first.',
            self: [
                { name: 'data-wrapper', note: 'one script tag registers the element and the runtime — the page you are reading runs on it.',
                  code: '<script src="https://unpkg.com/data-wrapper"><\/script>' },
            ],
            compare: [
                { name: 'Alpine.js', note: 'also installs as one script tag — drop it into any existing page and start.',
                  code: '<script src="//unpkg.com/alpinejs" defer><\/script>' },
                { name: 'htmx', note: 'same zero-tooling instinct: one script, no project scaffold.',
                  code: '<script src="https://unpkg.com/htmx.org"><\/script>' },
            ],
            contrast: [
                { name: 'React', note: 'JSX needs compilation, so real projects start with a bundler or framework CLI.',
                  code: 'npm create vite@latest my-app' },
                { name: 'Svelte', note: 'no build, no Svelte — the compiler is the product.',
                  code: '' },
                { name: 'Angular', note: 'a CLI-managed workspace stands between you and hello world.',
                  code: 'ng new my-app' },
            ],
        },
        views: {
            hook: 'HTML files as components',
            tagline: 'The unit of composition is a fetchable HTML file, placed by a custom element.',
            self: [
                { name: 'data-wrapper', note: 'point a wrapper at an HTML file — the browser fetches it, the runtime wires it in place.',
                  code: '<data-wrapper src="counter.html"></data-wrapper>' },
            ],
            compare: [
                { name: 'htmx', note: 'fetches HTML fragments into the page — the same “HTML over the wire” instinct, though the server renders it.',
                  code: '<div hx-get="/counter.html" hx-trigger="load"></div>' },
                { name: 'Lit', note: 'custom elements as mount points in plain HTML — same platform bones, but Lit components are authored in JS.',
                  code: '<my-counter></my-counter>' },
            ],
            contrast: [
                { name: 'React', note: 'a component is a function you import into a build — not a file the browser fetches.',
                  code: "import Counter from './Counter.jsx'" },
                { name: 'Vue', note: '.vue single-file components compile away; the browser never sees the file.',
                  code: "import Counter from './Counter.vue'" },
            ],
        },
        tokens: {
            hook: 'Three attribute tokens',
            tagline: 'Behavior attaches to markup through attributes — $ reads, @ calls, * renders. Each token has an ancestor in the framework space.',
            self: [
                { name: 'data-wrapper', note: '$ reads an export, @ calls one, * renders structure — one grammar for all three.',
                  code: '<output $text="count"></output>' },
            ],
            compare: [
                { name: 'Vue', note: 'template directives with the same instincts — @click is literally Vue’s event shorthand too.',
                  code: '<button @click="increment">+</button>' },
                { name: 'Angular', note: 'the * token is Angular’s own — *ngIf and *ngFor pioneered the structural-directive spelling.',
                  code: '<li *ngFor="let todo of todos">' },
                { name: 'Alpine.js', note: 'x-text, x-on, x-for: attributes as the wiring, evaluated in place.',
                  code: '<span x-text="count"></span>' },
            ],
            contrast: [
                { name: 'React', note: 'no template grammar at all — markup and logic merge in JSX.',
                  code: '<button onClick={increment}>+</button>' },
                { name: 'Mithril', note: 'goes the other way: markup written as JavaScript calls (hyperscript).',
                  code: "m('button', { onclick: increment }, '+')" },
            ],
        },
        deepdive: {
            hook: 'One token, one job',
            tagline: 'Structure changes ride on <template> directives; values and events stay on the elements they affect.',
            self: [
                { name: 'data-wrapper', note: 'the template is the row; ./ paths read the current item.',
                  code: '<template *list="todos">\n    <li $text="./task"></li>\n</template>' },
            ],
            compare: [
                { name: 'Vue', note: 'v-if and v-for map almost one-to-one onto *if and *list.',
                  code: '<li v-for="todo in todos">' },
                { name: 'Alpine.js', note: 'x-if and x-for also live on <template> tags — the same platform trick.',
                  code: '<template x-for="todo in todos">' },
            ],
            contrast: [
                { name: 'React', note: 'conditionals are ternaries and lists are .map() — full JavaScript power, full JavaScript noise.',
                  code: '{todos.map(t => <li>{t.task}</li>)}' },
                { name: 'Solid', note: 'wraps control flow in components so its compiler can track it.',
                  code: '<For each={todos}>{t => <li>{t.task}</li>}</For>' },
            ],
        },
        todos: {
            hook: 'A whole app, still no compiler',
            tagline: 'One HTML file: a module script for state, tokens for wiring, CSS alongside. That is the entire todo app.',
            self: [
                { name: 'data-wrapper', note: 'state is a module export; mutate it in an exported function and the bindings follow.',
                  code: 'export let todos = []' },
            ],
            compare: [
                { name: 'Alpine.js', note: 'an app this size is Alpine’s sweet spot too — state and handlers inline, no project.',
                  code: '<div x-data="{ todos: [] }">' },
                { name: 'Mithril', note: 'small complete apps on a tiny runtime, no mandatory tooling.',
                  code: 'm.mount(root, TodoApp)' },
            ],
            contrast: [
                { name: 'React', note: 'the same app conventionally wants a scaffold, hooks for state, and a dev server.',
                  code: 'const [todos, setTodos] = useState([])' },
                { name: 'Angular', note: 'brings dependency injection and a workspace to a 40-line todo list.',
                  code: "@Component({ selector: 'todo-list' })" },
            ],
        },
    };

    export default ({ props }) => {
        const entry = SECTIONS[props.section];
        if (!entry) throw new Error(`@tutorial/cousins: unknown section "${props.section}"`);
        return entry;
    };
</script>
