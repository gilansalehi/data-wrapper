<script type="module" data-module="@framework/next">

            kicker: 'Complete guide',
            title: 'Read the framework docs',
            body: 'Factories, composition, module imports, binding contexts, events, reactivity, and formatters.',
            action: 'Open the guide',

    // The card is clickable, but the anchor is the one real link: card

    export function follow(event) {
        const clicked = event.detail.originalEvent?.target;
        if (clicked?.closest?.('a')) return;
        event.target.querySelector('a')?.click();
    }
</script>
