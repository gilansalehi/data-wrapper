<script type="module" data-module="@view/peek">
    import { action } from 'data-wrapper';

    // A code peek that stays in sync with the real demo: it fetches the same
    // view file the widget loads, so there's one source of truth. `?file=` on
    // the src names the view to show. State lives in the factory closure so
    // several peeks on one page don't share it.
    export default ({ props }) => {
        const file = String(props.file ?? '');
        let source = 'Loading source…';

        fetch(file)
            .then(res => res.text())
            .then(action(text => { source = text.trim(); }))
            .catch(action(() => { source = `/* could not load ${file} */`; }));

        return {
            get code() { return source; },
            filename: file.split('/').pop() ?? 'source',
        };
    };
</script>

<details class="pitch__peek">
    <summary>view source</summary>
    <pre class="pitch__code"><code $data-title="filename" $text="code"></code></pre>
</details>
