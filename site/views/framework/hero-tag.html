<script type="module" data-module="@view/hero-tag">
    import { flush } from 'data-wrapper';

    // The hero performs the product: the tag types its own src, then the
    // "view" loads — a live clock proving the page is already reactive.
    const ATTR = 'src="/views/hello.html"';

    export let chars = 0;
    export let now = new Date();

    export const typed  = () => ATTR.slice(0, chars);
    export const loaded = () => chars >= ATTR.length;
    export const clock  = () => now.toLocaleTimeString('en-GB', { hour12: false });

    export default ({ cleanup }) => {
        let type;
        const start = setTimeout(() => {
            type = setInterval(() => {
                chars += 1;
                if (chars >= ATTR.length) clearInterval(type);
                flush();
            }, 65);
        }, 600);
        const tick = setInterval(() => { now = new Date(); flush(); }, 1000);
        cleanup(() => { clearTimeout(start); clearInterval(type); clearInterval(tick); });
    };
</script>

<section class="tag-hero" $data-loaded="loaded" aria-labelledby="tag-hero-title">

        </p>

        <div class="tag-hero__loadzone" aria-hidden="true">
            <template *if="loaded">
                <p class="tag-hero__result">Hello — it's <span $text="clock"></span>, and this HTML is already reactive.</p>
            </template>
        </div>

        <h1 class="tag-hero__title" id="tag-hero-title">One tag. Three tokens. Zero dependencies.</h1>
        <p class="tag-hero__copy">
            data-wrapper turns plain HTML files into live components with the
            browser primitives you already know. No build step, nothing to install.
        </p>
        <p class="tag-hero__actions">
            <a class="btn btn-primary" href="#nobuild">Get started</a>
            <a class="btn btn-outline" href="/playground">Playground</a>
            <a class="btn btn-outline" href="https://github.com/gilansalehi/data-wrapper" rel="noopener">GitHub</a>
        </p>
    </div>
    <a class="tag-hero__more" href="#nobuild" aria-label="Scroll to the first section">↓</a>
</section>
