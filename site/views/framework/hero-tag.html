<script type="module" data-module="@view/hero-tag">
    import { flush } from 'data-wrapper';

    // The hero performs the wrapper's own semantics: the tag never moves,
    // only its src retypes — and when the new value lands, the "loaded
    // view" markup and its live widget swap in beneath it. Hovering or
    // clicking a locator replays that slide.
    const SLIDES = [
        { id: 'text',  label: '$text',  src: '/hello.html',
          inner: '    <h2 $text="greeting">' },
        { id: 'click', label: '@click', src: '/count.html',
          inner: '    <button @click="plus">\n        +1\n    </button>' },
        { id: 'list',  label: '*list',  src: '/todos.html',
          inner: '    <template *list="todos">\n        <li $text="./task">' },
    ];
    const STEP_MS    = 65;
    const HOLD_TICKS = 66;   // ~4.3s of stillness after each slide lands

    // Idle mode: on hover-capable devices the hero rests as a bare
    // <data-wrapper> until the cursor enters; touch devices (no hover)
    // animate from load.
    const canHover = matchMedia('(hover: hover)').matches;

    export let active = !canHover;
    export let slide = 0;
    export let chars = 0;
    export let count = 0;
    let hold = 0;

    const current = () => SLIDES[slide];

    export function wake() {
        if (active) return;
        active = true;
        chars = 0;
        hold  = 0;
    }
    export function sleep() {
        active = false;
        chars = 0;
        hold  = 0;
    }

    export const typed = () => current().src.slice(0, chars);
    export const inner = () => '\n' + current().inner;
    export const done  = () => chars >= current().src.length;

    export const showText  = () => done() && current().id === 'text';
    export const showClick = () => done() && current().id === 'click';
    export const showList  = () => done() && current().id === 'list';

    export const greeting = () => {
        const h = new Date().getHours();
        return h < 12 ? 'Good morning.' : h < 18 ? 'Good afternoon.' : 'Good evening.';
    };
    export function plus() { count += 1; }

    export const todos = [
        { id: 1, task: 'fetch the view' },
        { id: 2, task: 'wire the bindings' },
        { id: 3, task: 'skip the build' },
    ];

    export const slides = () => SLIDES.map((s, i) => ({ ...s, index: i, active: i === slide }));

    export function goTo(event) {
        const target = event.detail.item;
        active = true;   // keyboard activation reaches here without mouseenter
        slide = target.index;
        chars = 0;
        hold  = 0;
    }

    export default ({ cleanup }) => {
        let step;
        const start = setTimeout(() => {
            step = setInterval(() => {
                if (!active) return;
                if (chars < current().src.length) {
                    chars += 1;
                } else if (++hold >= HOLD_TICKS) {
                    slide = (slide + 1) % SLIDES.length;
                    chars = 0;
                    hold  = 0;
                } else if (hold > 1) {
                    return;   // holding still: nothing changed, skip the flush
                }
                flush();
            }, STEP_MS);
        }, 600);
        cleanup(() => { clearTimeout(start); clearInterval(step); });
    };
</script>

<section class="tag-hero" $data-awake="active" @mouseenter="wake" @mouseleave="sleep" aria-labelledby="tag-hero-title" data-theme="dark">
    <div class="tag-hero__stage container">
        <h1 class="tag-hero__kicker" id="tag-hero-title">One tag. Three tokens. Zero dependencies.</h1>

        <div class="tag-hero__loadzone">
            <template *if="showText">
                <p class="tag-hero__result tag-hero__result--shout" $text="greeting"></p>
            </template>
            <template *if="showClick">
                <p class="tag-hero__result tag-hero__result--play">
                    <button type="button" class="tag-hero__demo-btn" @click="plus">+1</button>
                    <output class="tag-hero__count" $text="count"></output>
                    <span class="live-badge">live</span>
                </p>
            </template>
            <template *if="showList">
                <ul class="tag-hero__result tag-hero__result--list">
                    <template *list="todos"><li $text="./task"></li></template>
                </ul>
            </template>
        </div>
        <!-- Contiguous on one line: the box is white-space: pre-wrap, so
             markup whitespace inside it would render. The wrapper frame is
             static; the whole src part hides in idle mode, then only the
             src value types, then the "loaded" inner markup fades in. -->
        <p class="tag-hero__code" $data-done="done" aria-hidden="true"><span class="tag-hero__punct">&lt;</span><b>data-wrapper</b><span class="tag-hero__src"><span class="tag-hero__attr"> src=&quot;</span><span class="tag-hero__attr" $text="typed"></span><i class="tag-hero__caret"></i><span class="tag-hero__attr">&quot;</span></span><span class="tag-hero__punct">&gt;</span><span class="tag-hero__inner" $text="inner"></span></p>

        <nav class="tag-hero__dots" aria-label="Hero examples">
            <template *list="slides?key=id">
                <button type="button" class="tag-hero__dot" $data-active="./active" $aria-pressed="./active" $text="./label" @click="goTo" @mouseenter="goTo"></button>
            </template>
        </nav>

        <p class="tag-hero__copy">
            data-wrapper turns plain HTML files into live components with the
            browser primitives you already know. No build step, nothing to install.
        </p>
        <p class="tag-hero__actions">
            <a class="btn btn-primary" href="#nobuild">Get started</a>
            <a class="btn btn-outline" href="/tutorials">Tutorial</a>
            <a class="btn btn-outline" href="/playground">Playground</a>
            <a class="btn btn-outline" href="https://github.com/gilansalehi/data-wrapper" rel="noopener">GitHub</a>
        </p>
    </div>
    <a class="tag-hero__more" href="#nobuild" aria-label="Scroll to the first section">↓</a>
</section>

<style>

        display: grid;
        align-content: center;
        /* Fill the first screen minus the breadcrumb band above. */

    }

        text-transform: uppercase;
        color: var(--link);
    }

    /* ── the tag ──

       under a stationary cursor). */

        width: min(100%, 34ch);
        height: calc(4 * 1.35em);

    /* Idle mode (also the pre-hydration / no-JS state, hence :not):
       the whole src part vanishes, leaving <data-wrapper>, and the box
       slides so the bare tag sits optically centered — 50% of the box
       minus half the 14ch tag. Wake transitions it back to the stable
       left-anchored typing position. */

        display: none;

       fixed, so it costs no layout), revealed as one "load" moment.
       The transition lives ONLY on the visible state, so it fades in
       but snaps out — its $text swaps to the next slide's markup in
       the same flush that un-dones the box, and a two-way transition
       would flash that new markup while fading the old opacity out. */
    .tag-hero__inner {
        color: color-mix(in srgb, var(--hero-fg) 72%, transparent);
        opacity: 0;
    }
    .tag-hero__code[data-done="true"] .tag-hero__inner {
