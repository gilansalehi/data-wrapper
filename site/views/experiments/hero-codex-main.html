<script type="module" data-module="@experiments/hero-codex-main">
    import { flush } from 'data-wrapper';

    const CUES = [
        {
            attr: 'src="/views/app.html"',
            line: 'Load an HTML view directly into the page.',
            token: 'src',
        },
        {
            attr: '$text="count"',
            line: 'Write reactive values with plain attributes.',
            token: '$',
        },
        {
            attr: '@click="increment"',
            line: 'Call module exports from native DOM events.',
            token: '@',
        },
        {
            attr: '*src="panel"',
            line: 'Compose views without a compiler or build step.',
            token: '*',
        },
    ];

    export let index = 0;

    export const cue = () => CUES[index % CUES.length];
    export const attr = () => cue().attr;
    export const line = () => cue().line;
    export const phase = () => cue().token;
    export const tokens = () => CUES.map(item => ({
        label: item.token,
        active: item.token === cue().token,
    }));

    export default ({ cleanup }) => {
        const id = setInterval(() => {
            index += 1;
            flush();
        }, 2600);
        cleanup(() => clearInterval(id));
    };
</script>

            <em $text="attr"></em><span>&gt;</span>
        </h1>

        <p class="dw-main-hero__line" $text="line"></p>

        <ul class="dw-main-hero__tokens" aria-label="data-wrapper surfaces">
            <template *list="tokens?key=label">
                <li $data-active="./active"><code $text="./label"></code></li>
            </template>
        </ul>

        <p class="dw-main-hero__copy">
