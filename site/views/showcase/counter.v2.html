<script type="module" data-module="@view/counter">
    export let count = 0;

    export function plus()  { count += 1; }
    export function minus() { count -= 1; }
</script>

<p class="counter">
    <button @click="minus">−</button>
    <output $text="count"></output>
    <button @click="plus">+</button>
</p>

<style>
    .counter { display: flex; align-items: baseline; gap: 1rem; }
    .counter output { min-width: 2ch; text-align: center; font-size: 1.25em; }
</style>
