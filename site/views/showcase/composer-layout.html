<script type="module" data-module="@showcase/composer-layout">
    const PANELS = {
        profile:  '/views/showcase/composer-profile.html',
        metrics:  '/views/showcase/composer-metrics.html',
        settings: '/views/showcase/composer-settings.html',
    };

    export default ({ props, slots }) => {
        let panel = PANELS.profile;

        const is = url => () => panel === url;

        return {
            title: props.title,
            nav: slots.nav,
            get panel() { return panel; },
            select(event) {
                const button = event.target?.closest?.('button[value]');
                if (button?.value) panel = button.value;
            },
            isProfile:  is(PANELS.profile),
            isMetrics:  is(PANELS.metrics),
            isSettings: is(PANELS.settings),
        };
    };
</script>

<section class="composer-layout">
    <header class="composer-layout__header">
        <p class="composer-layout__eyebrow">*src composition</p>
        <h3 $text="title"></h3>
    </header>

    <template *src="nav">
        <p class="composer-layout__empty">No navigation was supplied.</p>
    </template>

    <section class="composer-layout__screen" aria-live="polite">
        <template *src="panel">
            <p class="composer-layout__empty">Choose a panel.</p>
        </template>
    </section>
</section>
