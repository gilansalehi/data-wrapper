<script type="module" data-module="@view/bind">
    export let name = '';

    export const greeting = () =>
        name.trim() ? `Hi, ${name.trim()}! 👋` : 'Start typing above…';

    export function setName(event) { name = event.target.value; }
</script>

<style>
    /* The input's whole look is the framework default. */
    @scope (.demo-bind) {
        :scope { display: flex; flex-direction: column; gap: .8rem; }

        input[type="text"] { margin: 0; }

        output {
            min-height: 1.6em;
            font-size: 1.2rem;
            font-weight: 700;
        }
    }
</style>

<div class="demo-bind">
    <input type="text" @input="setName"
           placeholder="your name" aria-label="your name">
    <output $text="greeting"></output>
</div>
