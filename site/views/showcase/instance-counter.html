<script type="module" data-module="@showcase/instance-counter">
    export const label = 'Reusable counter';

    export default ({ props }) => {
        let count = Number(props.start ?? 0);

        return {
            title: props.label ?? label,
            get count() { return count; },
            increment() { count += 1; },
            decrement() { count -= 1; },
        };
    };
</script>

<style>
    @scope (.instance-counter) {
        :scope { display: grid; gap: .75rem; }

        h3 { margin: 0; color: var(--muted); font-size: .92rem; }

        :scope > div {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: .55rem;
        }

        output {
            min-width: 2ch;
            text-align: center;
            font-size: 1.55rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
    }
</style>

<article class="card card--flat instance-counter">
    <h3 $text="title"></h3>
    <div>
        <button @click="decrement">-</button>
        <output $text="count"></output>
        <button @click="increment">+</button>
    </div>
</article>
