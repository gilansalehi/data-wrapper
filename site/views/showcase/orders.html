<script type="module" data-module="@view/orders">
    export let orders = [
        { id: 1, customer: 'Ada Lovelace', status: 'priority', lines: [
            { id: 'a', sku: 'PEN-BLK', name: 'Black gel pens', qty: 2, packed: true },
            { id: 'b', sku: 'INK-BLU', name: 'Blue ink refills', qty: 1, packed: false },
        ]},
        { id: 2, customer: 'Grace Hopper', status: 'standard', lines: [
            { id: 'c', sku: 'TAPE-12', name: 'Label tape', qty: 4, packed: false },
            { id: 'd', sku: 'CLIP-25', name: 'Cable clips', qty: 3, packed: true },
        ]},
    ];

    let nextOrderId = 3;
    let nextLineId  = 5;

    export const orderCount = () => orders.length;
    export const lineCount = () =>
        orders.reduce((sum, order) => sum + order.lines.length, 0);
    export const packedCount = () =>
        orders.reduce(
            (sum, order) => sum + order.lines.filter(line => line.packed).length,
            0
        );

    export function addOrder() {
        const id = nextOrderId++;
        orders = [
            ...orders,
            {
                id,
                customer: `New customer ${id}`,
                status: id % 2 ? 'priority' : 'standard',
                lines: [
                    {
                        id: `n${nextLineId++}`,
                        sku: `NEW-${id}`,
                        name: 'Starter kit',
                        qty: 1,
                        packed: false,
                    },
                ],
            },
        ];
    }

    export function addLine(event) {
        const order = event.detail.item;
        const id = nextLineId++;
        orders = orders.map(entry =>
            entry.id === order.id
                ? {
                    ...entry,
                    lines: [
                        ...entry.lines,
                        {
                            id: `n${id}`,
                            sku: `ADD-${id}`,
                            name: 'Extra supplies',
                            qty: 1 + (entry.lines.length % 4),
                            packed: false,
                        },
                    ],
                }
                : entry
        );
    }

    export function removeOrder(event) {
        const order = event.detail.item;
        orders = orders.filter(entry => entry.id !== order.id);
    }

    export function togglePacked(event) {
        const line = event.detail.item;
        orders = orders.map(order => ({
            ...order,
            lines: order.lines.map(entry =>
                entry.id === line.id
                    ? { ...entry, packed: event.target.checked }
                    : entry
            ),
        }));
    }
</script>

    <style>
    /* Scoped; the donut (to data-wrapper) keeps bare selectors out of
       the nested monitor component. Looks come from the atoms (card,
       rows, chip, kicker, btn-ghost) — only orders layout lives here.
       Sized by its container (card, pane, or page), not the viewport. */
    @scope (.orders-demo) to (data-wrapper) {
        :scope { container-type: inline-size; }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
        }
        :scope > header { margin-bottom: 1rem; }

        h2, h3, p { margin-top: 0; }

        /* Mobile-first: one column; the side monitor joins at width. */
        .orders-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            align-items: start;
            min-width: 0;
        }

        .order-stats {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            margin: 0 0 1rem;
        }

        .order-list {
            display: grid;
            gap: .85rem;
            min-width: 0;
        }

        .order-card { min-width: 0; }
        .order-card[data-status="priority"] {
            border-color: color-mix(in srgb, var(--warn) 45%, transparent);
        }

        .order-card ul {
            margin: .75rem 0 0;
            overflow-x: auto;
        }
        .order-card li {
            display: grid;
            grid-template-columns: auto minmax(5.5rem, .7fr) minmax(8rem, 1fr) auto;
        }
        .order-card li.packed { color: var(--muted); }
        .order-card li.packed span {
            text-decoration: line-through;
            opacity: .7;
        }
        .order-card li strong {
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .order-actions {
            display: flex;
            align-items: center;
            gap: .35rem;
        }

        @container (width >= 44rem) {
            :scope .orders-layout {
                grid-template-columns: minmax(0, 1fr) minmax(14rem, 18rem);
            }
        }
    }
</style>

<section class="orders-demo">
    <header class="orders-head">
        <div>
            <h2>Nested binding contexts</h2>
            <p>Each order creates a row context, and each line item creates another one.</p>
        </div>
        <button @click="addOrder">Add order</button>
    </header>

    <div class="order-stats" aria-label="Order totals">
        <span class="chip pill tint mono"><strong $text="orderCount"></strong>&nbsp;orders</span>
        <span class="chip pill tint mono"><strong $text="lineCount"></strong>&nbsp;lines</span>
        <span class="chip pill tint mono"><strong $text="packedCount"></strong>&nbsp;packed</span>
    </div>

    <div class="orders-layout">
        <div class="order-list">
            <template *list="orders">
                <article class="card order-card" $data-status="./status">
                    <header>
                        <div>
                            <h3 $text="./customer"></h3>
                            <span class="kicker" $text="./status"></span>
                        </div>
                        <div class="order-actions">
                            <button @click="addLine">Add line</button>
                            <button class="btn-ghost error" @click="removeOrder" aria-label="Remove order">✕</button>
                        </div>
                    </header>

                    <ul class="rows">
                        <template *list="./lines">
                            <li $class="./packed?bool=packed:open">
                                <input type="checkbox" $checked="./packed" @change="togglePacked" aria-label="Toggle packed">
                                <code $text="./sku"></code>
                                <span $text="./name"></span>
                                <strong>× <span $text="./qty"></span></strong>
                            </li>
                        </template>
                    </ul>
                </article>
            </template>
        </div>

        <data-wrapper src="/views/showcase/orders-monitor.html"></data-wrapper>
    </div>
</section>
