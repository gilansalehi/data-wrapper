<style>
    /* Flat card on the stage: bg alternation carries the edge. */
    @scope (.orders-monitor) {
        :scope { display: grid; gap: .75rem; }

        h3, p { margin: 0; }
        h3 { font-size: 1rem; }
        p  { color: var(--muted); font-size: .88rem; }

        dl { display: grid; gap: .5rem; margin: 0; }

        dl > div {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            border-top: 1px solid color-mix(in srgb, var(--muted) 18%, transparent);
            padding-top: .5rem;
        }

        dt { color: var(--muted); font-size: .82rem; }
        dd {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
    }
</style>

<aside class="card card--flat orders-monitor" aria-label="Operations monitor">
    <h3>Operations monitor</h3>
    <p>Fulfillment snapshot</p>
    <dl>
        <div>
            <dt>Orders</dt>
            <dd $text="//orders/orderCount"></dd>
        </div>
        <div>
            <dt>Lines</dt>
            <dd $text="//orders/lineCount"></dd>
        </div>
        <div>
            <dt>Packed</dt>
            <dd $text="//orders/packedCount"></dd>
        </div>
    </dl>
</aside>
