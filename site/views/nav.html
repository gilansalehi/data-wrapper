<script type="module" data-module="@view/nav">
    export { theme, toggleTheme } from 'state/theme.js';

    export let open = false;

    export function toggle() { open = !open; }
    export function close()  { open = false; }

    // Normalize the URL so the active-page match works whether the host serves
    // clean URLs (Cloudflare Pages: /framework) or file paths (local: /framework.html).
    const path = location.pathname.replace(/(?:index)?\.html$/, '') || '/';

    // Top-level site pages. `current` flags the active one for aria-current.
    export const pages = [
        { href: '/',          label: 'Home' },
        { href: '/framework', label: 'Framework guide' },
        { href: '/info',      label: 'Technical info' },
    ].map(p => ({ ...p, current: p.href === path }));

    // Mirror THIS page's authored table of contents (the sidebar aside) so the
    // nav reflects exactly the sections the page has — no hardcoded, page-blind
    // links. Pages without a sidebar (home) yield an empty list.
    export const sections = [...document.querySelectorAll('.docs-toc nav a[href^="#"]')]
        .map(a => ({ href: a.getAttribute('href'), label: a.textContent.trim() }));

    export const hasSections = () => sections.length > 0;
</script>

<header class="sticky header theme-ink">
    <div class="container header__kicker">&lt;data-wrapper&gt; : the no-framework framework</div>
</header>

<button @click="toggle" class="nav-hamburger" aria-label="Toggle navigation">
    <hr><hr><hr>
</button>

<div class="nav-backdrop" $class="open?bool=on:off" data-enter="fade" @click="close" aria-hidden="true"></div>

<dialog $open="open" data-enter="slide from-right" aria-label="Site navigation">
    <header class="nav-header">
        <strong>data-wrapper</strong>
        <button @click="close" class="nav-close" aria-label="Close navigation">✕</button>
    </header>
    <nav class="nav-links" aria-label="Site navigation">
        <span class="nav-section-label">Pages</span>
        <template *list="pages">
            <a $href="./href" $text="./label" $aria-current="./current?bool=page:false" @click="close"></a>
        </template>

        <template *if="hasSections">
            <div class="nav-group">
                <span class="nav-section-label">On this page</span>
                <template *list="sections">
                    <a $href="./href" $text="./label" @click="close"></a>
                </template>
            </div>
        </template>
    </nav>
    <footer class="nav-footer">
        <button @click="toggleTheme" class="theme-toggle">◐ Toggle theme (<span $text="theme"></span>)</button>
    </footer>
</dialog>
