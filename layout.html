<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data-wrapper — Layout prototype</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="/src/js/theme.js"></script>
    <link rel="stylesheet" href="/src/css/index.css">
    <script src="/dist/data-wrapper.js" type="module"></script>
    <script src="/src/js/main.js" type="module"></script>
</head>
<body>

<template id="dw-empty">
    <li class="dw-empty-msg">No tasks yet. Add one above.</li>
</template>

<data-wrapper id="nav" src="/views/nav.html" data-nav-open="false"
    onload="this.register({
        'nav/toggle':   () => nav.put('navOpen', v => !v),
        'nav/close':    () => nav.put('navOpen', false),
        'theme/toggle': () => theme.toggle(),
    })">
</data-wrapper>

<main class="container">

    <data-wrapper src="/views/framework/hero.html"></data-wrapper>
    <!-- Add more view loaders here as the layout is assembled:
    <data-wrapper src="/views/framework/pitch.html"></data-wrapper>
    <data-wrapper src="/views/showcase/todos.html"></data-wrapper>
    <data-wrapper src="/views/showcase/counter.html"></data-wrapper>
    <data-wrapper src="/views/reference/tokens.html"></data-wrapper>
    -->
</main>

</body>
</html>
