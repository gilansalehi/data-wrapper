<script type="module" data-component="structural">
    export let visible = false;
    export let items = [{ id: 1, label: 'One' }];

    export function toggle() {
        visible = !visible;
    }

    export function add() {
        items = [...items, {
            id: items.length + 1,
            label: `Item ${items.length + 1}`,
        }];
    }
</script>

<button @click="toggle">Toggle</button>
<button @click="add">Add</button>

<p data-note *if="visible">Visible</p>

<ul *list="items">
    <template>
        <li $text="./label"></li>
    </template>
</ul>
