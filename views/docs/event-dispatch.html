<figure data-source="registry.ts" data-region="event-dispatch">
  <figcaption>One delegated listener per <code>@event</code> token, attached to the wrapper. Native browser bubbling carries the event up; the listener filters out events owned by nested wrappers, then emits the topic named on the declaring element along with a <code>DispatchDetail</code>. Adding handlers to dynamically-inserted DOM costs nothing — the listener is already installed.</figcaption>
  <pre><code>export type DispatchPayload = Record&lt;string, unknown&gt;;
export type DispatchDetail  = {
    originalEvent: Event;
    payload:       DispatchPayload;
    path:          string;  // parsed pURL path — write target for put:/push:/pull:/patch: protocols
    isRel:         boolean; // pURL was relative (`./`) — listener uses this to detect row-scoped intent
};
export type DispatchEvent = CustomEvent&lt;DispatchDetail&gt;;</code></pre>
</figure>
