<figure data-source="registry.ts" data-region="event-dispatch">
  <figcaption>One delegated listener per <code>@event</code> token, attached to the wrapper. Native browser bubbling carries the event up; the listener filters out events owned by nested wrappers, then emits the topic named on the declaring element along with a <code>DispatchDetail</code>. Adding handlers to dynamically-inserted DOM costs nothing — the listener is already installed. Component actions read the originating DOM event directly through standard accessors (<code>event.target.value</code>, <code>event.target.checked</code>, <code>new FormData(form)</code>) — no framework-side harvest. <code>item</code> rides the detail when the event fires inside a <code>*list</code> row, so row-scoped handlers don&#x27;t have to walk the DOM.</figcaption>
  <pre><code>export type DispatchDetail  = {
    originalEvent: Event;
    path:          string;  // parsed pURL path
    isRel:         boolean; // pURL was relative (`./`)
    item?:         Item;    // row item when the @-event fired inside a *list row
};
export type DispatchEvent = CustomEvent&lt;DispatchDetail&gt;;</code></pre>
</figure>
