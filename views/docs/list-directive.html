<figure data-source="engine.ts" data-region="list-directive">
  <figcaption>Reconciles a child <code>&lt;template&gt;</code> against an array. Reuses rows by identity (default key <code>id</code>; override with <code>?key=field</code>), publishes updated values into existing row subscribers, and renders a <code>data-empty</code> template when the array is empty.</figcaption>
  <pre><code>const listDirective: DirectiveHandler = ({ wrapper, el, key, wake }) =&gt; {
    const tpl = el.querySelector(&#x27;:scope &gt; template&#x27;) as HTMLTemplateElement | null;
    if (!tpl) return () =&gt; {};

    let cache = wrapper._listCache.get(el);
    if (!cache) {
        cache = new Map();
        wrapper._listCache.set(el, cache);
    }

    const identityKey = key || &#x27;id&#x27;;
    let emptyNode: Element | null = null;

    const clearRows = () =&gt; {
        cache.forEach(row =&gt; { unwire(row.unsubs); row.node.remove(); });
        cache.clear();
    };

    const showEmpty = () =&gt; {
        if (emptyNode?.parentElement === el) return;

        const emptyName = el.getAttribute(&#x27;data-empty&#x27;) || &#x27;dw-empty&#x27;;
        const emptyTpl  = resolveTemplate(emptyName);
        emptyNode = cloneTemplate(emptyTpl);
        if (!emptyNode) return;

        emptyNode.setAttribute(&#x27;_empty&#x27;, &#x27;&#x27;);
        el.appendChild(emptyNode);
        wake(emptyNode);
    };

    const hideEmpty = () =&gt; {
        emptyNode?.remove();
        emptyNode = null;
    };

    return value =&gt; {
        const items = Array.isArray(value) ? value : [];

        if (items.length === 0) {
            clearRows();
            showEmpty();
            return;
        }

        hideEmpty();
        reconcile(el, items, cache, tpl, identityKey);
    };
};</code></pre>
</figure>
