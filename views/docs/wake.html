<figure data-source="wire.ts" data-region="wake">
  <figcaption>The lifecycle entry point. <code>wake()</code> walks the subtree with a <code>TreeWalker</code>, skipping nested wrappers, templates, and SVG (per <code>NO_WAKE</code>). Each wired element gets the <code>_live</code> attribute so re-entry is idempotent. Walking happens once; every tokenized attribute is compiled into a subscriber by <code>wire()</code>, so runtime updates never re-parse anything.</figcaption>
  <pre><code>export const wake = (
    root: Element,
    row: Row | null = null,
    wrapper: WrapperNode | null = root.closest(&#x27;data-wrapper&#x27;),
) =&gt; {
    if (!wrapper) return;
    const nodes = [root];

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT, {
        acceptNode: (n: Node) =&gt; NO_WAKE.includes((n as Element).tagName)
            ? NodeFilter.FILTER_REJECT
            : NodeFilter.FILTER_ACCEPT,
    });

    let node: Node | null;
    while ((node = walker.nextNode())) nodes.push(node as Element);

    for (const el of nodes) {
        if (el.hasAttribute(LIVE)) continue;

        const attrs = [...el.attributes].filter(attr =&gt; TOKENS.includes(attr.name[0]));
        if (!attrs.length) continue;

        el.setAttribute(LIVE, &#x27;&#x27;);
        for (const attr of attrs) wire(el, attr, row, wrapper);
    }
};</code></pre>
</figure>
