<figure data-source="registry.ts" data-region="wrapper-contract">
  <figcaption>The shape every <code>&lt;data-wrapper&gt;</code> presents to the rest of the framework. <code>state</code> reads and writes through a Proxy over <code>data-*</code> attributes; <code>_subs</code> is the wrapper&#x27;s Station (one channel per path); <code>_listCache</code> holds row caches per <code>*list</code> element; <code>_unsubs</code> collects the <code>Off</code> handles for subscriptions that escape the wrapper&#x27;s own scope, so <code>load()</code> can tear them down. <code>put()</code> is the framework&#x27;s path-aware writer — <code>bind()</code>&#x27;s wrapper-data-* branch routes <code>$data-*</code> sinks through it so the computed-value cascade rides the same primitive every other binding uses. <code>_isSyncing</code> gates self-publish during a put-driven drain and during the same put&#x27;s MutationObserver echo.</figcaption>
  <pre><code>export type Wrapper = HTMLElement &amp; {
    state:        Record&lt;string, unknown&gt;;
    _subs:        Station;
    _listCache:   ListCache;
    _unsubs:      Off[];
    _isSyncing?:  boolean;
    _component?:  ComponentBindingRuntime;
    put:          (key: string, val: unknown | ((prev: unknown) =&gt; unknown)) =&gt; void;
};</code></pre>
</figure>
