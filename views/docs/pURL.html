<figure data-source="engine.ts" data-region="pURL">
  <figcaption>pURL drives the framework&#x27;s wire surface — <code>pURL()</code> in <code>utils.ts</code> does the parsing; these helpers consume the result. <code>formatter()</code> compiles a pURL&#x27;s query string into a left-to-right pipeline at wake time, so runtime updates never look up formatters again. Each <code>?key=value</code> is dispatched as a formatter named by the key with the value as its argument; the legacy <code>?format=name</code> is a meta-key that applies the named formatter with no argument. Framework-level keys (<code>key</code>, <code>prevent</code>, <code>stop</code>, <code>immediate</code>) are reserved and skipped.</figcaption>
  <pre><code>const RESERVED_PARAMS = new Set([&#x27;key&#x27;, &#x27;prevent&#x27;, &#x27;stop&#x27;, &#x27;immediate&#x27;]);

const formatter = (params: URLSearchParams, wrapper: WrapperNode | null = null): Format =&gt; {
    type Step = (v: unknown) =&gt; unknown;
    const steps: Step[] = [];

    for (const [key, val] of params) {
        if (key === &#x27;format&#x27;) {
            // Legacy: `format=NAME` applies the named formatter with no arg.
            const fn = DW_FORMATTERS.get(val);
            if (fn) steps.push(v =&gt; fn(v));
            continue;
        }
        if (RESERVED_PARAMS.has(key)) continue;
        const fn = DW_FORMATTERS.get(key);
        if (!fn) continue;
        // A param value that looks like a local-absolute pURL (`/path`)
        // is resolved against the wrapper at fire time and the resolved
        // value is handed to the formatter instead of the raw string.
        // Relative paths (`./…`) are scope-dependent and left to the
        // formatter to handle; cross-host paths (`//host/…`) too.
        if (wrapper &amp;&amp; val.startsWith(&#x27;/&#x27;) &amp;&amp; !val.startsWith(&#x27;//&#x27;)) {
            const argPath = val.slice(1);
            steps.push(v =&gt; fn(v, readPath(wrapper.state, argPath)));
            continue;
        }
        steps.push(v =&gt; fn(v, val));
    }

    return value =&gt; steps.reduce((v, step) =&gt; step(v), value);
};</code></pre>
</figure>
