  <figcaption>The contract <code>wire()</code> consumes for every <code>$</code> and <code>*</code> token, and the put: listener consumes for every write. <code>resolve()</code> (in engine.ts) returns one of these for any pURL by looking up a Handler — the built-in DEFAULT_HANDLER for default-protocol pURLs, a registered ProtocolHandler for non-default ones. Wire() never branches on where the value came from.All four methods are total. <code>subscribe</code> is the read-side stream: it fires once on attach with the current value, then fires again on each publish for reactive sources or never again for one-shot ones. The Off it returns is meaningful for reactive sources, a no-op for one-shot ones — wire() pushes it onto <code>unsubs</code> iff <code>escapes</code> is set.<code>read</code> is a one-shot value getter — symmetry with <code>write</code>; rarely used directly since <code>subscribe</code> fires once initially. <code>write</code> round-trips values back to the source&#x27;s origin (<code>wrapper.put</code> for state-channel, <code>handler.write</code> for protocol handlers, noop for handlers that don&#x27;t expose write).The writeback at engine.ts:478 (when a non-default protocol is sunk into <code>$data-*</code> on a wrapper) gates on protocol identity, not on <code>write</code> presence — every Source has <code>write</code> now, but only non-default protocols opt into bidirectional state sync. Default-protocol sources don&#x27;t get writeback subscribed, avoiding cycles like <code>$data-foo=&quot;/bar&quot;</code> where writing back foo would re-trigger bar.<code>escapes</code> tells wire() the subscription leaves local scope — a row&#x27;s <code>/absolute</code> path subscribing to the wrapper, a <code>//host/</code> path crossing wrapper boundaries. Tracked for teardown.</figcaption>
  <pre><code>export type Source = {
    read:      ()           =&gt; unknown;
    write:     (v: unknown) =&gt; void;
    subscribe: (cb: Sub)    =&gt; Off;
    escapes:                   boolean;
};

// `resolve()` returns both the source and the wrapper that formatters
// resolve `/path`-shaped param values against. They travel together —
// a `//host/path` DWRL names another wrapper as the formatter context
// alongside the source.
export type Resolution = {
    source: Source;
    target: Wrapper;
};</code></pre>
</figure>
