<figure data-source="engine.ts" data-region="if-directive">
  <figcaption>Toggles an element&#x27;s presence in the DOM. When the value is falsy, the element is replaced with a comment anchor; when truthy, it returns to its place and re-wakes. Useful for conditionally rendered fragments inside list rows or wrapper roots.</figcaption>
  <pre><code>const ifDirective: DirectiveHandler = ({ wrapper, el, row, wake }) =&gt; {
    const anchor = document.createComment(&#x27;dw-if&#x27;);

    const show = () =&gt; {
        if (el.isConnected) return;
        anchor.replaceWith(el);
        wake(el, row ?? null, wrapper);
    };

    const hide = () =&gt; {
        if (!el.isConnected) return;
        el.replaceWith(anchor);
    };

    return value =&gt; {
        if (value) show();
        else hide();
    };
};</code></pre>
</figure>
