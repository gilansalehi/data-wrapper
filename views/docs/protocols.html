  <figcaption>Resolvers for non-DWRL pURLs that appear as <code>$</code> and <code>*</code> attribute values (<code>&lt;data-wrapper $data-todos=&quot;localstorage://todos&quot;&gt;</code>, <code>&lt;ul *list=&quot;localstorage://snapshot&quot;&gt;</code>, ...). <code>resolve()</code> looks the protocol up here and wraps the handler in a <code>BindingSource</code> — its <code>subscribe</code> fires once with the read value (one-shot — no in-process pub/sub from storage); <code>write</code>, if exposed, gets carried through and wire() composes a writeback on the wrapper&#x27;s matching state channel for any wrapper-data-* sink.**Handler shape is the bidirectionality contract.** A bare function (or <code>{read}</code>-only object) is read-once: wake reads the value into the sink and that&#x27;s that. An object exposing <code>write</code> is read-write: every state change on the bound dataset key propagates back through <code>write</code>. No <code>?sync</code> flag at the binding site — the shape decides.**JSON-round-trip is the storage convention.** Handlers that persist structured values should <code>JSON.parse</code> on read and <code>JSON.stringify</code> on write to match dataset semantics. String-valued sources (a future <code>url://?param=...</code>) can skip the parse but should accept stringified writes when bidirectional.**<code>write</code> init-fires once on attach.** The writeback subscription uses the framework&#x27;s <code>subscribe()</code> primitive, which fires every sub with its initial value — so the just-read value gets written back immediately. For <code>localstorage:</code> that&#x27;s idempotent. Protocols with expensive or non-idempotent writes (a future <code>api://</code> POST) should guard internally or expose <code>read</code>-only.Keys are lowercase by URL-spec convention — <code>new URL()</code> lowercases the protocol scheme, so we register under the same form. Devs write <code>localStorage://</code> for readability; the parser normalises it on the way through.Custom protocols: <code>DW_PROTOCOLS.set(&#x27;api&#x27;, (purl) =&gt; fetch(...))</code>.</figcaption>
  <pre><code>    [&#x27;localstorage&#x27;, {
        // `localstorage://todos` → host is `todos`. URL parsing places
        // the first segment after `://` in `hostname` (lowercased),
        // not in `pathname`. localStorage keys are flat, so host is
        // the key. Case-sensitivity caveat: keys are lowercased by URL
        // parsing — use lowercase localStorage keys to match.
        read: (purl) =&gt; {
            const raw = localStorage.getItem(purl.host);
            if (raw == null) return undefined;
            try { return JSON.parse(raw); } catch { return raw; }
        },
        write: (purl, value) =&gt; {
            if (value === undefined) { localStorage.removeItem(purl.host); return; }
            localStorage.setItem(purl.host, JSON.stringify(value));
        },
    }],</code></pre>
