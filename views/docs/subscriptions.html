<figure data-source="engine.ts" data-region="subscriptions">
  <pre><code>export const subscribe = (station: Station, channel: string, sub: Sub, value: unknown) =&gt; {
    (station[channel] ??= []).push(sub);
    sub(value);
};

export const publish = (station: Station, channel: string, value: unknown) =&gt; {
    for (const sub of station[channel] ?? []) sub(value);
}</code></pre>
</figure>
