<article class="demo" data-to="todosCode" @reflect="demo/reflect">
    <form @submit="todo/add?prevent">
        <input type="text" name="task" placeholder="What needs doing?" required autocomplete="off">
        <button type="submit">Add</button>
    </form>

    <ul class="todo-list" *list="/view" data-empty="dw-empty">
        <template>
            <li class="todo-item" $class="./done?onoff=done:active">
                <input type="checkbox" $checked="./done" name="done" @change="put:./done" aria-label="Toggle todo completion">
                <span $text="./task"></span>
                <strong class="done-badge" *if="./done">done</strong>
                <button class="delete-btn" @click="todo/remove" name="id" $value="./id" aria-label="Remove">✕</button>
            </li>
        </template>
    </ul>

    <div class="controls">
        <span><strong $text="/active?format=count">0</strong> active</span>
        <div class="filter-btns" role="group" aria-label="Filter todos">
            <button @click="put:/filter" name="filter" value="all">All</button>
            <button @click="put:/filter" name="filter" value="active">Active</button>
            <button @click="put:/filter" name="filter" value="done">Done</button>
        </div>
    </div>

    <details>
        <summary>Live state — inspect data-todos in DevTools or expand here</summary>
        <pre><code $text="/todos?format=json"></code></pre>
    </details>

    <script>
        const app = document.currentScript.closest('data-wrapper');

        if (localStorage.getItem('todos') === null) {
            localStorage.setItem('todos', JSON.stringify([
                { id: 1, task: 'Master the DOM',    done: true  },
                { id: 2, task: 'Ship data-wrapper', done: false },
                { id: 3, task: 'Write the docs',    done: false },
            ]));
        }

        const compute = () => {
            const todos  = app.state.todos  || [];
            const filter = app.state.filter || 'all';
            app.put('active', todos.filter(t => !t.done));
            app.put('view', todos.filter(t =>
                filter === 'all' ? true : filter === 'active' ? !t.done : t.done
            ));
        };

        // What remains as JS: the operations the `put:` protocol can't yet
        // express. `todo/add` needs `push:` (append to array); `todo/remove`
        // needs `pull:` (filter array). Both are reserved on the roadmap.
        // Checkbox toggle and filter selection are now declarative via
        // `put:./done` and `put:/filter` on `@change`/`@click`.
        app.register({
            'todo/add': e => {
                const task = String(e.detail.payload.task ?? '').trim();
                if (!task) return;
                app.push('todos', { id: Date.now(), task, done: false });
                e.target.reset();
            },
            'todo/remove': e => {
                const id = Number(e.detail.payload.id);
                app.put('todos', prev => (prev || []).filter(t => t.id !== id));
            },
        });

        app.addEventListener('dw/sync', e => {
            // Row-relative `put:./done` writes to /view (the *list source),
            // not /todos (the canonical store). Cascade row-level edits back
            // to /todos so derived state (/active, /view) recomputes.
            if (e.detail.key === 'view') {
                const view  = app.state.view  || [];
                const todos = app.state.todos || [];
                const updated = todos.map(t => {
                    const v = view.find(x => x.id === t.id);
                    return v && v.done !== t.done ? { ...t, done: v.done } : t;
                });
                if (updated.some((t, i) => t !== todos[i])) app.put('todos', updated);
                return;
            }
            if (e.detail.key === 'todos' || e.detail.key === 'filter') compute();
        });
    </script>
</article>
