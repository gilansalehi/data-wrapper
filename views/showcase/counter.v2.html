<script type="module" data-module="@view/counter">
    export let count = 0;
    export const doubled = () => count * 2;

    export function increment(event) {
        count += Number(event.target.value);
    }
</script>

<section class="component-counter">
    <button @click="increment?prevent" value="1">Increment</button>
    <output data-output="count" $text="count"></output>
    <output data-output="doubled" $text="doubled"></output>
</section>
