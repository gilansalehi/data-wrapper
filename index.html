<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data-wrapper — HTML-first reactivity</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="manifest" href="/site.webmanifest">
    <script type="importmap">{"imports":{"state/":"/state/"}}</script>
    <script>
        // Apply saved theme synchronously to avoid flash. The /state/theme.js
        // module reads this attribute when first imported by any component.
        (() => {
            try {
                const v = localStorage.getItem('data-wrapper:theme');
                if (v === 'light' || v === 'dark') document.documentElement.dataset.theme = v;
            } catch {}
        })();
    </script>
    <link rel="stylesheet" href="/src/css/index.css">
    <script src="/dist/data-wrapper.js" type="module" data-shim-src="https://ga.jspm.io/npm:es-module-shims@2.8.1/dist/es-module-shims.js"></script>
    <script src="/src/js/main.js" type="module"></script>
</head>
<body>

<data-wrapper id="nav" src="/views/nav.html" $data-nav-open="open"></data-wrapper>

<header>
    <data-wrapper src="/views/framework/hero.html"></data-wrapper>
</header>

<main class="container">
    <data-wrapper src="/views/showcase/theme.html"></data-wrapper>
    <data-wrapper src="/views/showcase/todos.v3.html"></data-wrapper>
</main>
</body>
</html>
