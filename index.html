<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data-wrapper — HTML-first reactivity</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="/src/js/theme.js"></script>
    <link rel="stylesheet" href="/src/css/index.css">
    <script src="/dist/data-wrapper.js" type="module"></script>
    <script src="/src/js/main.js" type="module"></script>
</head>
<body>

<data-wrapper id="nav" src="/views/nav.html" data-nav-open="false"
    onload="this.register({
        'nav/toggle':   () => this.put('navOpen', v => !v),
        'nav/close':    () => this.put('navOpen', false),
        'theme/toggle': () => window.theme?.toggle(),
    })">
</data-wrapper>

<header>
    <data-wrapper src="/views/framework/hero.html"></data-wrapper>
</header>

<main class="container">
    <data-wrapper id="why"
        class="collapsible"
        data-collapsed="false"
        src="views/framework/why.html"
        onload="this.register({ 'why/toggle': () => why.put('collapsed', v => v !== 'true' && v !== true) })"
    >
    </data-wrapper>

    <data-wrapper src="views/showcase/todos.v3.html"></data-wrapper>

</main>
</body>
</html>
